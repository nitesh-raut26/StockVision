name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

      - name: Build (verifies bundle splits)
        run: npm run build

      - name: Check bundle sizes
        run: |
          echo "=== Bundle sizes ==="
          du -sh dist/assets/*.js 2>/dev/null | sort -rh | head -20
          # Fail if any single chunk exceeds 600KB
          find dist/assets -name "*.js" -size +600k | while read f; do
            echo "FAIL: $f exceeds 600KB"
            exit 1
          done

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Python lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockvision_test
          POSTGRES_USER: stockvision
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: pip install ruff && ruff check app/

      - name: Import check (verifies all modules load cleanly)
        env:
          DATABASE_URL: postgresql+asyncpg://stockvision:test@localhost:5432/stockvision_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: ci-test-secret-minimum-32-characters-long
          ENVIRONMENT: test
        run: python -c "from app.main import app; print('Import OK — routes:', len(app.routes))"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://stockvision:test@localhost:5432/stockvision_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: ci-test-secret-minimum-32-characters-long
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short || echo "No tests yet — add tests/test_auth.py to start"

  # ── Docker build check ─────────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t stockvision-backend ./backend

      - name: Build frontend image
        run: docker build -t stockvision-frontend ./frontend
